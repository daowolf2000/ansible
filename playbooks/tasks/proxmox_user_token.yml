---
# FIX: Переписать
- name: Generate Terraform Authentication Token
  ansible.builtin.command:
    cmd: "pveum user token add {{ terraform_proxmox_user }} terraform-token --privsep=0 --noborder --noheader"

  changed_when: false
  register: _token_output

- name: Extract Full Token ID and Secret from Output
  ansible.builtin.set_fact:
    full_token_id: "{{ _token_output.stdout_lines[0].split()[1].strip() }}"
    secret: "{{ _token_output.stdout_lines[2].split()[1].strip() }}"
