---
- name: Базовая настройка Proxmox
  hosts: pve
  become: yes

  tasks:

    - name: Обновление репозитория
      apt:
        update_cache: yes
        cache_valid_time: 3600
        
    - name: Установка пакетов
      apt:  
        name: "{{ item }}"
        state: latest
      loop: "{{ proxmox_package }}"
      tags: ['base']

    - name: Загрузка cloud-init образов в Proxmox по списку
      ansible.builtin.include_tasks: "{{ ans_dir }}/tasks/proxmox_cloudimage_load.yml"
      vars:
        proxmox_cloudimage_template_vmid: "{{ item.vmid }}"
        proxmox_cloudimage_url:           "{{ item.url }}"
        proxmox_cloudimage_name:          "{{ item.name }}"
      loop: 
        "{{ proxmox_cloudimages }}"
      tags: ['cloudinit']

        


    